<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>

body {

    margin: 0;

    background:
        linear-gradient(
            180deg,
            #0f172a,
            #020617
        );

    color: white;

    font-family:
        Arial,
        sans-serif;
}

h1 {

    text-align: center;

    font-size: 50px;

    margin-top: 30px;
}

#leaderboard {

    width: 900px;

    margin: auto;
}

.entry {

    display: flex;

    align-items: center;

    justify-content: space-between;

    margin: 10px 0;

    padding: 15px;

    background:
        rgba(
            255,
            255,
            255,
            0.05
        );

    border-radius: 12px;
}

.rank {

    width: 60px;

    font-weight: bold;

    font-size: 24px;
}

.name {

    flex: 1;

    font-size: 22px;
}

.score {

    width: 180px;

    text-align: right;

    font-size: 22px;
}

button {

    margin-left: 20px;

    padding: 8px 15px;

    cursor: pointer;
}

.top1 {

    background:
        linear-gradient(
            90deg,
            gold,
            #ffec8b
        );

    color: black;
}

.top2 {

    background:
        silver;

    color: black;
}

.top3 {

    background:
        #cd7f32;

    color: black;
}

</style>

</head>

<body>

<h1>
🏆 Leaderboard
</h1>

<div id="leaderboard"></div>

<script
    type="module"
    src="./client/leaderboard.js">
</script>

</body>
</html>
