<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<title>Result</title>

<style>

body {


margin: 0;

width: 100vw;
height: 100vh;

display: flex;
justify-content: center;
align-items: center;

background:
    radial-gradient(
        circle at center,
        #1a1a2e 0%,
        #0a0a12 60%,
        #000 100%
    );

color: white;

font-family:
    "Segoe UI",
    sans-serif;

overflow: hidden;


}

#container {


width: 700px;

padding: 40px;

border-radius: 25px;

background:
    rgba(0,0,0,0.75);

backdrop-filter: blur(10px);

border:
    2px solid cyan;

box-shadow:
    0 0 20px #00ffff55,
    0 0 80px #00ffff22;

text-align: center;


}

h1 {


margin-top: 0;

font-size: 50px;

color: cyan;

letter-spacing: 5px;

text-shadow:
    0 0 15px cyan;


}

.rank {


font-size: 120px;

font-weight: bold;

margin: 10px 0;

text-shadow:
    0 0 25px gold;


}

.score {


font-size: 55px;

color: white;

margin-bottom: 30px;


}

.stats {


display: flex;

flex-direction: column;

gap: 12px;

margin-bottom: 30px;

font-size: 22px;


}

.stats div {


background:
    rgba(255,255,255,0.05);

padding: 12px;

border-radius: 10px;


}

.buttons {


display: flex;

flex-direction: column;

gap: 12px;


}

button {


height: 55px;

border: none;

border-radius: 12px;

background:
    linear-gradient(
        135deg,
        #00ffff,
        #0088ff
    );

color: white;

font-size: 20px;

font-weight: bold;

cursor: pointer;

transition:
    transform .15s,
    box-shadow .15s;


}

button:hover {


transform:
    translateY(-2px);

box-shadow:
    0 0 20px #00ffff88;


}

button:active {


transform:
    scale(0.97);


}

</style>

</head>

<body>

<div id="container">


<h1>RESULT</h1>

<div
    id="rank"
    class="rank">
</div>

<div
    id="score"
    class="score">
</div>

<div class="stats">

    <div id="spawned"></div>

    <div id="hit"></div>

    <div id="dodged"></div>

</div>

<div class="buttons">

    <button id="replay">
        ▶ 리플레이 보기
    </button>

    <button id="saveReplay">
        💾 리플레이 저장
    </button>

    <button id="go_to_main">
        🏠 메인메뉴
    </button>

</div>


</div>


<script>

document
.getElementById(
    "saveReplay"
)
.addEventListener(
    "click",
    () => {

        const result =
            JSON.parse(
                sessionStorage.getItem(
                    "result"
                )
            );

        const blob =
            new Blob(
                [
                    JSON.stringify(
                        result,
                        null,
                        4
                    )
                ],
                {
                    type:
                    "application/json"
                }
            );

        const url =
            URL.createObjectURL(
                blob
            );

        const a =
            document.createElement(
                "a"
            );

        a.href = url;

        a.download =
            `replay_${Date.now()}.json`;

        a.click();

        URL.revokeObjectURL(
            url
        );
    }
);

document
.getElementById("go_to_main")
.addEventListener(
    "click",
    () => {

        location.href =
            "/";
    }
);

const raw =
    sessionStorage.getItem(
        "result"
    );

if (!raw) {

    alert(
        "결과 데이터가 없습니다."
    );

    location.href =
        "/";

    throw new Error(
        "Missing result"
    );
}

const result =
    JSON.parse(raw);

document
.getElementById("rank")
.textContent =
    result.rank;

document
.getElementById("score")
.textContent =
    result.score.toLocaleString()
    + " / 1,000,000";

document
.getElementById("spawned")
.textContent =
    "생성된 탄막: "
    + result.bulletsSpawned;

document
.getElementById("hit")
.textContent =
    "맞은 횟수: "
    + result.bulletsHit;

document
.getElementById("dodged")
.textContent =
    "피한 탄막: "
    + result.bulletsDodged;

document
.getElementById("replay")
.addEventListener(
    "click",
    () => {

        sessionStorage.setItem(
            "replayData",
            JSON.stringify(
                result.replayData
            )
        );

            sessionStorage.setItem(
                "replaySeed",
                result.seed
            );

                location.href =
                "/game?replay=1";
    }
);

const rankElement =
    document.getElementById("rank");

rankElement.textContent =
    result.rank;

switch (result.rank) {

    case "S":
        rankElement.style.color =
            "#ffd700";
        break;

    case "A":
        rankElement.style.color =
            "#00ffff";
        break;

    case "B":
        rankElement.style.color =
            "#66ff66";
        break;

    case "C":
        rankElement.style.color =
            "#ff9933";
        break;

    default:
        rankElement.style.color =
            "#ff4444";
}

</script>

</body>
</html>
