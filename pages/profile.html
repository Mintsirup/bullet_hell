<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<title>Profile</title>

<style>

body{

    margin:0;

    background:#0a0a12;

    color:white;

    font-family:
        sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

#container{

    width:700px;

    background:
        rgba(0,0,0,.7);

    border:
        2px solid cyan;

    border-radius:20px;

    padding:30px;
}

h1{

    color:cyan;

    text-align:center;
}

.section{

    margin-top:25px;
}

.stat{

    margin:8px 0;
}

.achievement{

    padding:10px;

    margin:5px 0;

    border-radius:8px;

    background:
        rgba(
            255,
            255,
            255,
            .05
        );
}

button{

    margin-top:20px;

    width:100%;
    height:50px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:
        cyan;

    color:black;

    font-weight:bold;
}

</style>

</head>

<body>

<div id="container">

<h1>프로필</h1>

<div id="username"></div>

<div class="section">

    <h2>통계</h2>

    <div
        class="stat"
        id="highestScore">
    </div>

    <div
        class="stat"
        id="highestRank">
    </div>

    <div
        class="stat"
        id="gamesPlayed">
    </div>

    <div
        class="stat"
        id="totalDodged">
    </div>

    <div
        class="stat"
        id="totalSurvival">
    </div>

</div>

<div class="section">

    <h2>업적</h2>

    <div id="achievements">
    </div>

</div>

<button
    onclick="location.href='/'">

    메인으로
</button>

</div>

<script src="/client/profile.js"></script>

</body>
</html>
