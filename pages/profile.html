<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<title>Profile</title>

<style>

body{

    margin:0;

    background:#0a0a12;

    color:white;

    font-family:sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

#container{

    width:min(900px,90vw);

    padding:25px;

    box-sizing:border-box;

    background:
        rgba(0,0,0,.7);

    border:
        2px solid cyan;

    border-radius:20px;
}

h1{

    color:cyan;

    text-align:center;
}

.section{

    margin-top:25px;
}

.stat{

    margin:8px 0;
}

button{

    margin-top:10px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:cyan;

    color:black;

    font-weight:bold;

    padding:10px 15px;
}

input{

    width:100%;

    height:40px;

    margin-top:8px;

    padding-left:10px;

    border-radius:8px;

    border:none;

    box-sizing:border-box;
}

#achievements{

    display:grid;

    grid-template-columns:
        repeat(
            auto-fill,
            minmax(
                clamp(
                    140px,
                    20vw,
                    180px
                ),
                1fr
            )
        );

    gap:12px;
}

.achievementCard{

    display:flex;

    flex-direction:
        column;

    justify-content:
        center;

    align-items:
        center;

    text-align:
        center;

    min-height:
        120px;

    border:
        2px solid cyan;

    border-radius:
        12px;
}

.achievementCard:hover{

    transform:
        translateY(-3px);

    box-shadow:
        0 0 15px cyan;
}

.achievementIcon{

    font-size:36px;

    margin-bottom:8px;
}

.achievementTitle{

    font-weight:bold;

    color:white;
}

.locked{

    filter:
        grayscale(100%);

    opacity:.35;

    border-color:#333;

    box-shadow:none;
}

.locked .achievementTitle{

    color:#777;
}

.friendCard{

    padding:10px;

    margin:5px 0;

    border-radius:10px;

    background:#1a1a28;

    border:1px solid cyan;
}

#friends{

    margin-top:10px;
}

#requests button{

    width:100%;

    margin-bottom:5px;
}

#searchResult{

    margin-top:15px;

    padding:15px;

    border-radius:10px;

    background:#151522;

    border:1px solid cyan;
}

.mainBtn{

    width:100%;
    height:50px;
}

.friendCard{

    background:
        rgba(
            255,
            255,
            255,
            .05
        );

    border:
        1px solid cyan;

    padding:12px;

    margin-bottom:8px;

    border-radius:10px;
}

.requestCard{

    display:flex;

    justify-content:
        space-between;

    align-items:center;

    padding:12px;

    margin-bottom:10px;

    border-radius:10px;

    border:
        1px solid orange;
}

.acceptBtn{

    width:auto;

    padding:
        8px 16px;

    background:
        lime;

    color:black;

    font-weight:bold;
}

.userCard{

    border:
        1px solid cyan;

    border-radius:10px;

    padding:15px;

    margin-top:10px;

    background:
        rgba(
            255,
            255,
            255,
            .05
        );
}

#profileGrid{

    display:grid;

    grid-template-columns:
        minmax(280px,350px)
        1fr;

    gap:20px;

    margin-top:20px;
}

.leftColumn,
.rightColumn{

    display:flex;

    flex-direction:column;

    gap:20px;
}

.card{

    background:
        rgba(
            255,
            255,
            255,
            .03
        );

    border:
        1px solid cyan;

    border-radius:12px;

    padding:20px;
}

.card h2{

    margin-top:0;

    color:cyan;
}

#friends{

    max-height:200px;

    overflow-y:auto;
}

#requests{

    max-height:200px;

    overflow-y:auto;
}

#searchResult{

    min-height:80px;
}

.mainBtn{

    margin-top:20px;
}

@media (max-width: 900px){

    #profileGrid{

        grid-template-columns:
            1fr;
    }

    #container{

        width:95vw;

        padding:20px;
    }

    #achievements{

        grid-template-columns:
            repeat(
                auto-fill,
                minmax(
                    140px,
                    1fr
                )
            );
    }
}

</style>

</head>

<body>

<div id="container">

    <h1>프로필</h1>

    <div id="username"></div>

    <div id="profileGrid">

        <div class="leftColumn">

            <div class="card">
                <h2>친구</h2>

                <div id="friends"></div>

                <input
                    id="friendName"
                    placeholder="친구 닉네임"
                >

                <button id="addFriend">
                    친구 추가
                </button>
            </div>

            <div class="card">
                <h2>친구 요청</h2>

                <div id="requests"></div>
            </div>

            <div class="card">
                <h2>유저 검색</h2>

                <input
                    id="searchName"
                    placeholder="닉네임 검색"
                >

                <button id="searchBtn">
                    검색
                </button>

                <div id="searchResult"></div>
            </div>

        </div>

        <div class="rightColumn">

            <div class="card">
                <h2>통계</h2>

                <div class="stat" id="highestScore"></div>
                <div class="stat" id="highestRank"></div>
                <div class="stat" id="gamesPlayed"></div>
                <div class="stat" id="totalDodged"></div>
                <div class="stat" id="totalSurvival"></div>
            </div>

            <div class="card">
                <h2>업적</h2>

                <div id="achievements"></div>
            </div>

        </div>

    </div>

    <button
        class="mainBtn"
        onclick="location.href='/'"
    >
        메인으로
    </button>

</div>

<script src="/client/profile.js"></script>

</body>
</html>
