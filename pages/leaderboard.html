<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>

body {

    margin:0;

    min-height:100vh;

    background:
        radial-gradient(
            circle at top,
            #1e293b,
            #020617 70%
        );

    color:white;

    font-family:
        "Segoe UI",
        sans-serif;
}

h1 {

    text-align:center;

    font-size:60px;

    margin-top:30px;

    color:#00ffff;

    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

#leaderboard {

    width:min(
        95vw,
        1000px
    );

    margin:auto;

    padding-bottom:40px;
}

.entry {

    display:flex;

    align-items:center;

    justify-content:space-between;

    margin:12px 0;

    padding:18px;

    background:
        rgba(
            255,
            255,
            255,
            .05
        );

    border:
        1px solid
        rgba(
            0,
            255,
            255,
            .3
        );

    border-radius:16px;

    backdrop-filter:
        blur(10px);

    transition:
        .2s;
}

.entry:hover {

    transform:
        translateY(-3px);

    box-shadow:
        0 0 25px
        rgba(
            0,
            255,
            255,
            .4
        );
}

.rank {

    width:80px;

    font-weight:bold;

    font-size:28px;
}

.name {

    flex:1;

    font-size:24px;

    font-weight:700;
}

.score {

    width:220px;

    text-align:right;

    font-size:24px;

    font-weight:bold;

    color:#00ffff;
}

button {

    border:none;

    border-radius:10px;

    padding:10px 18px;

    cursor:pointer;

    font-weight:bold;

    background:
        linear-gradient(
            135deg,
            #00ffff,
            #0088ff
        );

    color:white;

    transition:.2s;
}

button:hover {

    transform:
        scale(1.05);

    box-shadow:
        0 0 15px
        cyan;
}

.top1 {

    background:
        linear-gradient(
            90deg,
            #ffd700,
            #fff3a0
        );

    color:black;

    box-shadow:
        0 0 25px gold;
}

.top2 {

    background:
        linear-gradient(
            90deg,
            #c0c0c0,
            #ffffff
        );

    color:black;
}

.top3 {

    background:
        linear-gradient(
            90deg,
            #cd7f32,
            #ffb36b
        );

    color:black;
}

.rankBadge{

    width:50px;

    text-align:center;

    border-radius:8px;

    font-weight:bold;

    padding:4px;
}

#modeButtons {

    display:flex;

    justify-content:center;

    gap:15px;

    margin-bottom:25px;
}

#backBtn {

    position:fixed;

    top:20px;

    left:20px;

    z-index:1000;

    padding:12px 20px;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    background:
        linear-gradient(
            135deg,
            #ef4444,
            #dc2626
        );

    color:white;

    transition:.2s;
}

#backBtn:hover {

    transform:
        translateY(-2px);

    box-shadow:
        0 0 20px
        rgba(
            239,
            68,
            68,
            .6
        );
}

</style>

</head>

<body>

<button id="backBtn">

← 나가기

</button>

<h1>
🏆 Leaderboard
</h1>

<div id="leaderboard"></div>

<div id="modeButtons">

    <button id="normalBtn">
        일반
    </button>

    <button id="hardcoreBtn">
        하드코어
    </button>

</div>

<script
    type="module"
    src="../client/leaderboard.js">
</script>

</body>
</html>
