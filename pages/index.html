<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Bullet Hell</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;

    width:100vw;
    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(
            circle at center,
            #1a1a2e 0%,
            #0f0f18 50%,
            #000 100%
        );

    color:white;

    font-family:
        "Segoe UI",
        sans-serif;
}

#container{

    width:420px;

    padding:40px;

    display:flex;
    flex-direction:column;
    gap:15px;

    border-radius:20px;

    background:
        rgba(0,0,0,.7);

    backdrop-filter:blur(10px);

    border:
        2px solid #00ffff;

    box-shadow:
        0 0 20px #00ffff55,
        0 0 60px #00ffff22;
}

h1{

    margin:0 0 15px 0;

    text-align:center;

    color:#00ffff;

    font-size:42px;

    letter-spacing:3px;
}

p{

    margin:0;

    text-align:center;

    color:#aaa;
}

input{

    height:50px;

    border:none;

    border-radius:10px;

    padding:0 15px;

    background:#111;

    color:white;

    font-size:18px;

    outline:none;
}

input:focus{

    box-shadow:
        0 0 10px cyan;
}

button{

    height:55px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    color:white;

    font-size:18px;

    font-weight:bold;

    transition:
        .15s;
}

button:hover{

    transform:
        translateY(-2px);

    box-shadow:
        0 0 20px #00ffff88;
}

button:active{

    transform:
        scale(.97);
}

.primary{

    background:
        linear-gradient(
            135deg,
            #00ffff,
            #0088ff
        );
}

.secondary{

    background:
        linear-gradient(
            135deg,
            #444,
            #222
        );
}

#loadReplay{
    display:none;
}

.version{

    margin-top:10px;

    text-align:center;

    color:#666;

    font-size:13px;
}

</style>

</head>

<body>

<div id="container">


<h1>BULLET HELL</h1>

<p>S+가 되면 1만원을 얻을 수 있다고?!(선착순 1명 리플레이파일 필요)</p>

<button
    id="startButton"
    class="primary">

    게임 시작
</button>

<button 
    id="hardcoreBtn"
    class="secondary">
    
    하드코어
</button>

<button
    id="leaderboardBtn"
    class="secondary">

    랭킹
</button>

<button
    id="loadReplayBtn"
    class="secondary">

    리플레이 불러오기
</button>

<input
    type="file"
    id="loadReplay"
    accept=".json"
>

<button 
    id="profileBtn"
    class="secondary">
프로필
</button>

<div class="version">
    v1.0
</div>


</div>

<script>

document
.getElementById(
    "profileBtn"
)
.onclick =
() => {

    location.href =
        "/profile";
};

const username =
    localStorage.getItem(
        "username"
    );

if (!username) {

    location.href =
        "/login";

} else {

    const userText =
        document.createElement(
            "div"
        );

    userText.style.marginTop =
        "10px";

    userText.style.textAlign =
        "center";

    userText.style.color =
        "#00ffff";

    userText.textContent =
        `${username} 님 환영합니다`;

    document
        .getElementById(
            "container"
        )
        .appendChild(
            userText
        );

    const logoutBtn =
        document.createElement(
            "button"
        );

    logoutBtn.className =
        "secondary";

    logoutBtn.textContent =
        "로그아웃";

    logoutBtn.onclick =
        () => {

            localStorage.removeItem(
                "username"
            );

            location.href =
                "/login";
        };

    document
        .getElementById(
            "container"
        )
        .appendChild(
            logoutBtn
        );

    const hardcoreBtn =
        document.getElementById(
            "hardcoreBtn"
        );

    fetch(

        `/api/hardcore-unlock/${username}`

    )

    .then(
        r => r.json()
    )

    .then(
        data => {

            if(
                !data.unlocked
            ) {

                hardcoreBtn.disabled =
                    true;

                hardcoreBtn.textContent =
                    "하드코어 (S 필요)";

                hardcoreBtn.style.opacity =
                    "0.5";

                hardcoreBtn.style.cursor =
                    "not-allowed";
            }
        }
    );
}

document
.getElementById(
    "startButton"
)
.onclick =
() => {

    sessionStorage.setItem(
        "nickname",
        username
    );

    sessionStorage.setItem(
        "hardcore",
        "0"
    );

    location.href =
        "/game";
};

document
.getElementById(
    "hardcoreBtn"
)
.onclick =
() => {

    sessionStorage.setItem(
        "nickname",
        username
    );

    sessionStorage.setItem(
        "hardcore",
        "1"
    );

    location.href =
        "/game";
};

document
.getElementById(
    "leaderboardBtn"
)
.onclick =
() => {

    location.href =
        "/leaderboard";
};

document
.getElementById(
    "loadReplayBtn"
)
.onclick =
() => {

    document
    .getElementById(
        "loadReplay"
    )
    .click();
};

document
.getElementById(
    "loadReplay"
)
.onchange =
e => {

    const file =
        e.target.files[0];

    if (!file)
        return;

    const reader =
        new FileReader();

    reader.onload =
    () => {

        const replay =
            JSON.parse(
                reader.result
            );

        sessionStorage.setItem(
            "replayData",
            JSON.stringify(
                replay.replayData
            )
        );

        sessionStorage.setItem(
            "replaySeed",
            replay.seed
        );

        sessionStorage.setItem(
            "replayName",
            replay.name || "Unknown"
        );

        sessionStorage.setItem(
            "replayScore",
            replay.score || 0
        );

        location.href =
            "/game?replay=1";
    };

    reader.readAsText(
        file
    );
};

</script>

</body>
</html>
