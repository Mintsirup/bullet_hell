<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bullet Hell</title>

    <style>
        body {
    margin: 0;

    background:
        radial-gradient(
            circle at center,
            #1a1a2e 0%,
            #0f0f18 50%,
            #000 100%
        );

    color: white;

    font-family:
        "Segoe UI",
        sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    width: 100vw;
    height: 100vh;

    overflow: hidden;
}

#container {

    width: 380px;

    padding: 30px;

    border-radius: 20px;

    background:
        rgba(0, 0, 0, 0.7);

    backdrop-filter:
        blur(10px);

    border:
        2px solid #00ffff;

    box-shadow:
        0 0 20px #00ffff55,
        0 0 60px #00ffff22;

    display: flex;
    flex-direction: column;

    gap: 12px;
}

input {

    height: 48px;

    border: none;

    border-radius: 10px;

    padding: 0 15px;

    background: #111;

    color: white;

    font-size: 18px;

    outline: none;
}

input:focus {

    box-shadow:
        0 0 10px cyan;
}

button {

    height: 50px;

    border: none;

    border-radius: 10px;

    background:
        linear-gradient(
            135deg,
            #00ffff,
            #0088ff
        );

    color: white;

    font-size: 18px;

    font-weight: bold;

    cursor: pointer;

    transition:
        transform .15s,
        box-shadow .15s;
}

button:hover {

    transform:
        translateY(-2px);

    box-shadow:
        0 0 20px #00ffff88;
}

button:active {

    transform:
        scale(0.97);
}
    </style>
</head>

<body>

    <h1>Bullet Hell</h1>

    <input
        type="text"
        id="nickname"
        placeholder="닉네임 입력"
    />

    <button id="startButton">
        game start
    </button>

    <button id="loadReplayBtn">
        리플레이 불러오기
    </button>

    <button id="leaderboardBtn">
        leaderboard
    </button>

    <input
        type="file"
        id="loadReplay"
        accept=".json"
        hidden
    >

    <script>

        document
        .getElementById(
            "leaderboardBtn"
        )
        .addEventListener(
            "click",
            () => {

                location.href =
                    "leaderboard.html";
            }
        );

        document
        .getElementById(
            "loadReplayBtn"
        )
        .addEventListener(
            "click",
            () => {

                document
                .getElementById(
                    "loadReplay"
                )
                .click();
            }
        );

        document
        .getElementById(
            "loadReplay"
        )
        .addEventListener(
            "change",
            e => {

                const file =
                    e.target.files[0];

                if (!file) return;

                const reader =
                    new FileReader();

                reader.onload =
                    () => {

                        const replay =
                            JSON.parse(
                                reader.result
                            );

                        sessionStorage.setItem(
                            "replayData",
                            JSON.stringify(
                                replay.replayData
                            )
                        );

                        sessionStorage.setItem(
                            "replaySeed",
                            replay.seed
                        );

                        location.href =
                            "game.html?replay=1";
                    };

                reader.readAsText(
                    file
                );
            }
        );

        document
        .getElementById("startButton")
        .addEventListener(
            "click",
            () => {

                const nickname =
                    document
                    .getElementById(
                        "nickname"
                    )
                    .value
                    .trim();

                sessionStorage.setItem(
                    "nickname",
                    nickname || "Anonymous"
                );

                location.href =
                    "game.html";
            }
        );
    </script>

</body>
</html>
