<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Room Result</title>

<style>

body {

    background: black;
    color: white;

    font-family: Arial;

    text-align: center;
}

h1 {

    margin-top: 30px;
}

.entry {

    width: 600px;

    margin: 15px auto;

    padding: 15px;

    border: 2px solid white;

    font-size: 24px;

    display: flex;

    justify-content: space-between;
}

.first {

    border-color: gold;
    color: gold;
}

.second {

    border-color: silver;
    color: silver;
}

.third {

    border-color: #cd7f32;
    color: #cd7f32;
}

button {

    margin-top: 30px;

    width: 200px;
    height: 50px;

    font-size: 20px;
}

</style>

</head>

<body>

<h1>🏆 게임 결과 🏆</h1>

<div id="results"></div>

<button id="backButton">
메인으로
</button>

<script>

const results =

    JSON.parse(
        sessionStorage.getItem(
            "roomResults"
        )
    ) || [];

const container =

    document.getElementById(
        "results"
    );

results.forEach(

    (player, index) => {

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "entry";

        if (index === 0)
            div.classList.add(
                "first"
            );

        if (index === 1)
            div.classList.add(
                "second"
            );

        if (index === 2)
            div.classList.add(
                "third"
            );

        div.innerHTML =
        `
        <span>
        #${index + 1}
        </span>

        <span>
        ${player.name}
        </span>

        <span>
        ${player.score.toLocaleString()}
        </span>

        <span>
        ${player.rank}
        </span>
        `;

        container.appendChild(
            div
        );
    }
);

document
.getElementById(
    "backButton"
)
.onclick =
() => {

    location.href =
        "index.html";
};

</script>

</body>
</html>
