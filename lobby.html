<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lobby</title>

<style>

body {

    background: black;
    color: white;

    font-family: Arial;

    display: flex;

    justify-content: center;
    align-items: center;

    height: 100vh;
}

#container {

    display: flex;
    flex-direction: column;

    gap: 10px;

    width: 300px;
}

input,
button {

    height: 40px;
    font-size: 18px;
}

</style>

</head>

<body>

<div id="container">

    <input
        id="nickname"
        placeholder="닉네임"
    >

    <button id="createRoom">
        방 만들기
    </button>

    <input
        id="roomCode"
        placeholder="방 코드"
    >

    <button id="joinRoom">
        방 참가
    </button>

</div>

<script type="module">

const socket =
    new WebSocket(
        "ws://${window.location.hostname}:23334"
    );

let playerId;

socket.onmessage =
    event => {

        const data =
            JSON.parse(
                event.data
            );

        switch (
            data.type
        ) {

            case "connected":

                playerId =
                    data.playerId;

                sessionStorage.setItem(
                    "playerId",
                    playerId
                );

                break;

            case "roomCreated":

                sessionStorage.setItem(
                    "roomId",
                    data.roomId
                );

                location.href =
                    "room.html";

                break;

            case "joinResult":

                if (
                    data.success
                ) {

                    location.href =
                        "room.html";

                } else {

                    alert(
                        "방 참가 실패"
                    );
                }

                break;
        }
    };

document
.getElementById(
    "createRoom"
)
.onclick =
() => {

    const name =

        document
        .getElementById(
            "nickname"
        )
        .value
        .trim();

    sessionStorage.setItem(
        "nickname",
        name
    );

    socket.send(
        JSON.stringify({

            type:
                "createRoom",

            playerId,

            name
        })
    );
};

document
.getElementById(
    "joinRoom"
)
.onclick =
() => {

    console.log("JOIN CLICK");

    socket.onopen =
    () => {

        console.log(
            "SOCKET OPEN"
        );
    };

    const name =

        document
        .getElementById(
            "nickname"
        )
        .value
        .trim();

    const roomId =

        document
        .getElementById(
            "roomCode"
        )
        .value
        .trim()
        .toUpperCase();

    sessionStorage.setItem(
        "nickname",
        name
    );

    sessionStorage.setItem(
        "roomId",
        roomId
    );

    socket.send(
        JSON.stringify({

            type:
                "joinRoom",

            playerId,

            roomId,

            name
        })
    );
};

</script>

</body>
</html>
