<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Hell</title>

    <style>
        body {
            margin: 0;
            background: black;

            display: flex;
            justify-content: center;
            align-items: center;

            width: 100vw;
            height: 100vh;
        }

        canvas {
            image-rendering: pixelated;
        }

        #mobile-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            user-select: none;
        }

        #mobile-controls button {
            width: 70px;
            height: 70px;
            font-size: 30px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <canvas id="game"></canvas>

    <script
        type="module"
        src="./client/game.js">
    </script>

</body>
</html>
