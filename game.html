<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Hell</title>

    <style>
        body {
margin: 0;


background:
    radial-gradient(
        circle at center,
        #151525 0%,
        #090912 60%,
        #000 100%
    );

overflow: hidden;

display: flex;
justify-content: center;
align-items: center;

width: 100vw;
height: 100vh;


}

body::before {


content: "";

position: fixed;
inset: 0;

background:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.02) 0px,
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

pointer-events: none;


}

canvas {


image-rendering: pixelated;

border: 2px solid #00ffff;

border-radius: 12px;

background: black;

box-shadow:
    0 0 20px #00ffff55,
    0 0 80px #00ffff22,
    inset 0 0 30px #00ffff11;


}

#frame {


padding: 20px;

border-radius: 20px;

background:
    rgba(0,0,0,0.5);

backdrop-filter: blur(8px);

border:
    1px solid rgba(
        0,
        255,
        255,
        0.2
    );

box-shadow:
    0 0 40px rgba(
        0,
        255,
        255,
        0.15
    );


}

#title {


position: fixed;

top: 20px;
left: 50%;

transform:
    translateX(-50%);

color: cyan;

font-size: 32px;

font-weight: bold;

letter-spacing: 4px;

text-shadow:
    0 0 10px cyan,
    0 0 30px cyan;


}

#version {


position: fixed;

bottom: 15px;
right: 20px;

color: #888;

font-size: 14px;


}

    </style>
</head>

<body>

    <body>


<div id="title">
    BULLET HELL
</div>

<div id="frame">
    <canvas id="game"></canvas>
</div>

<div id="version">
    v1.0
</div>

<script
    type="module"
    src="./client/game.js">
</script>


</body>


</body>
</html>
